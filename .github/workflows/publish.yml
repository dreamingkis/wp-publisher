name: 노션 → WordPress 자동 발행

on:
  schedule:
    # 매 5분마다 실행 (GitHub Actions 허용 최소 주기)
    # ⚠️ GitHub 부하에 따라 실제 실행은 최대 30~60분 지연될 수 있음
    - cron: '*/5 * * * *'

  push:
    branches: [main]
    paths: ['notion_wp_publisher.py']  # 발행 스크립트 변경 시 즉시 실행

  workflow_dispatch:  # GitHub 웹에서 수동 실행 버튼

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 노션 → WP 발행 실행
        run: python notion_wp_publisher.py
        env:
          NOTION_TOKEN:    ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:    ${{ secrets.NOTION_DB_ID }}
          WP_URL:          ${{ secrets.WP_URL }}
          WP_USER:         ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
